<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline Monitor — Pipeline</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Sidebar navigace -->
    <nav id="sidebar" class="sidebar"></nav>

    <!-- Hlavní obsah -->
    <main class="main-content">
        <div class="page-header">
            <div>
                <h1>Pipeline</h1>
                <p class="subtitle">Správa a spouštění datových pipeline</p>
            </div>
            <button class="btn btn-primary" onclick="openCreateModal()">+ Nová pipeline</button>
        </div>

        <div id="pipelines-content">
            <div class="state-loading">
                <div class="spinner"></div>
                Načítání...
            </div>
        </div>
    </main>

    <!-- Modal: Vytvořit pipeline -->
    <div id="create-modal" class="modal-overlay hidden">
        <div class="modal">
            <h2>Nová pipeline</h2>
            <div class="form-group">
                <label>Název</label>
                <input type="text" id="pipeline-name" placeholder="např. daily-order-aggregation">
            </div>
            <div class="form-group">
                <label>Popis</label>
                <textarea id="pipeline-description" rows="2" placeholder="Co pipeline dělá..."></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Dataset</label>
                    <select id="pipeline-dataset"></select>
                </div>
                <div class="form-group">
                    <label>Schedule (cron)</label>
                    <input type="text" id="pipeline-schedule" placeholder="např. 0 2 * * *">
                </div>
            </div>
            <div id="create-error" style="color: #FCA5A5; font-size: 13px; margin-bottom: 12px; display: none;"></div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeCreateModal()">Zrušit</button>
                <button class="btn btn-primary" onclick="createPipeline()">Vytvořit</button>
            </div>
        </div>
    </div>

    <!-- Skripty -->
    <script src="js/api.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/pipelines.js"></script>
    <script>renderSidebar('pipelines');</script>
</body>
</html>
